<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head th:replace="~{layout :: head('Erro no Sistema')}">
    <title>Erro no Sistema</title>
</head>
<body>

    <!-- Nav Bar -->
    <header th:replace="~{layout :: nav(false)}"></header>

    <!-- Main Container -->
    <main class="page-container">
        <div class="error-container">
            <div class="error-code">ERRO</div>
            <h2 class="error-message">Ops! Ocorreu um erro inesperado</h2>
            
            <p class="error-desc" th:text="${mensagem != null} ? ${mensagem} : 'O recurso solicitado não pôde ser processado ou não foi encontrado em nosso servidor.'">
                Mensagem detalhada do erro gerado pela aplicação.
            </p>

            <div style="margin-top: 30px;" class="d-flex justify-content-center gap-3">
                <a th:href="@{/index}" class="btn-black">Voltar Para a Loja</a>
                <a th:href="@{/admin}" class="btn-outline">Ir para o Painel Admin</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
